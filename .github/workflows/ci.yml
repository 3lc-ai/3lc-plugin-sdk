name: CI

# Lint, type-check, and test the plugin SDK. 3lc resolves from the public 3LC releases
# index (no credentials); pytest runs with TLC_AUTH_MODE=dev so importing tlc needs no API key.
on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: ruff · mypy · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --python 3.12 --dev --locked

      - name: Ruff lint
        run: uv run --python 3.12 ruff check .

      - name: Ruff format check
        run: uv run --python 3.12 ruff format --check .

      - name: mypy (strict)
        run: uv run --python 3.12 mypy src/

      - name: pytest
        run: uv run --python 3.12 pytest -q
        env:
          # tlc activates its API key at IMPORT time, so even the import-light test (which
          # imports tlc_plugin_sdk -> tlc) needs a valid key in a fresh runner — TLC_AUTH_MODE=dev
          # does NOT work with a released wheel. The SDK tests only import tlc (no data ops), so
          # TLC_API_KEY alone is enough — unlike 3lc-examples, no RUNTIME_*/ENVIRONMENT_* env
          # pointing is needed. (ruff + mypy above are static analysis and need no key.)
          TLC_API_KEY: ${{ secrets.TLC_API_KEY }}

      - name: Minimize uv cache
        run: uv cache prune --ci
