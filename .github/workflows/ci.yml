name: CI

# Static gates only — ruff + mypy. Both are keyless: 3lc resolves from the public 3LC
# releases index (no credentials), and neither tool imports tlc (mypy treats it as an
# untyped boundary). pytest is intentionally NOT run here: every test imports tlc, which
# activates a real API key, and we will not put a live key in this (public-destined) repo's
# secrets. tlc-dependent tests run in the ADO pipelines instead (vault-reachable). Revisit
# once tlc supports keyless import (3.1 AUTH_MODE=dev) or via OIDC/self-hosted runner.
on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: ruff · mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --python 3.12 --dev --locked

      - name: Ruff lint
        run: uv run --python 3.12 ruff check .

      - name: Ruff format check
        run: uv run --python 3.12 ruff format --check .

      - name: mypy (strict)
        run: uv run --python 3.12 mypy src/

      # NOTE: pytest is deliberately not run here — see the header comment (catch-22:
      # tests import tlc → need a live key, which must not live in this public-destined repo).

      - name: Minimize uv cache
        run: uv cache prune --ci
