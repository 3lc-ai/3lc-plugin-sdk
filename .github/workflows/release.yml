name: Release

# Publish a tagged release of 3lc-plugin-sdk to PUBLIC PyPI (pypi.org) via OIDC
# trusted publishing — no long-lived API token, no stored secrets.
#
# === ONE-TIME SETUP (everything below is ready; this is all that's left) ===
# 1. On PyPI, register a "pending" trusted publisher (Account -> Publishing) BEFORE the
#    first release, since the project does not exist yet. Bind it to:
#      PyPI Project Name : 3lc-plugin-sdk
#      Owner             : 3lc-ai
#      Repository name   : 3lc-plugin-sdk
#      Workflow name     : release.yml
#      Environment name  : release
#    Use a 3LC-org-owned PyPI account as the project owner (not a personal one).
# 2. Create a GitHub Environment named "release" (repo Settings -> Environments). For OIDC it
#    needs NO secrets — it only has to exist (the name is part of the trusted-publisher bind
#    above). Optionally add required reviewers to gate publishes.
#
# To cut a release: bump `version` in pyproject.toml, commit, then push a tag `vX.Y.Z`
# that matches it (or run via workflow_dispatch).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Gate the release on the full CI suite (ruff · mypy · pytest).
  test:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    # OIDC: GitHub mints a short-lived token PyPI trades for an upload scope. No secrets.
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"

      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          PKG=$(uv version --output-format json | jq -r '.version')
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag $GITHUB_REF_NAME ($TAG) != pyproject version $PKG"; exit 1; }

      # --no-sources strips [tool.uv.sources] so the released wheel never bakes in a dev
      # index/path override (the published artifact resolves deps from public indexes).
      - name: Build
        run: uv build --no-sources

      - name: Publish to PyPI (OIDC trusted publishing)
        run: uv publish --trusted-publishing always
